name: Android 17 Compatibility CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  android17-compatibility:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 17 SDK
        run: sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew scripts/verify-compatibility.sh

      - name: Build plugin
        run: ./gradlew :android-systrace-plugin:build --no-daemon

      - name: Run Android 17 trace regression
        run: ./scripts/verify-compatibility.sh
